apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: llm-tutor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: notification-service
          image: ghcr.io/edgarsilva-tech/llm_tutor/notification_service:dev-20260321-122303
          imagePullPolicy: Always
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: PORT
              value: "8006"
            - name: RABBITMQ_ROUTING_KEY
              value: "notification.email.request"
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 20
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 20
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: llm-tutor
spec:
  selector:
    app: notification-service
  ports:
    - port: 8006
      targetPort: 8006
